<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NHL Goal Light</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #171614;
  --surface:   #1c1b19;
  --surface2:  #242320;
  --border:    #2e2d2a;
  --text:      #e8e6e0;
  --muted:     #7a7870;
  --accent:    #cc0000;
  --accent-dim:#8b0000;
  --red:       #d44c4c;
  --green:     #4caf50;
  --yellow:    #c9a227;
  --radius:    5px;
  --sidebar-w: 230px;
  --header-h:  44px;
}

[data-theme="light"] {
  --bg:       #f4f3f0;
  --surface:  #ffffff;
  --surface2: #ebebea;
  --border:   #d0cfc9;
  --text:     #1a1916;
  --muted:    #7a7870;
}
[data-theme="light"] .log-wrap  { background: #f5f5f5; }
[data-theme="light"] .log-line  { color: #2a2a2a; }
[data-theme="light"] #global-tip { background:#fff!important; color:#1a1916!important; border-color:#d0cfc9!important; }

html, body {
  height: 100%;
  font-family: 'Satoshi', system-ui, sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}

/* ── Layout ── */
.app {
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
  overflow: hidden;
}

header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 200;
}

.logo { font-weight: 700; font-size: 14px; letter-spacing: -0.2px; color: var(--text); }
.logo span { color: var(--accent); }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.status-pill {
  font-size: 11px; font-weight: 500; padding: 2px 10px;
  border-radius: 20px; background: var(--surface2);
  border: 1px solid var(--border); color: var(--muted);
  transition: background .2s, color .2s;
}
.status-pill.monitoring { background: #1a3a1e; border-color: #2d6633; color: var(--green); }

.icon-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--muted); width: 32px; height: 32px; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .15s, color .15s; flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

#menu-btn { display: none; }

/* ── Sidebar ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-x: hidden;
  overflow-y: auto;
  padding: 12px 0 32px;
  transition: transform .25s ease;
}

.sidebar-section { padding: 0 12px; margin-bottom: 18px; }

.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px; padding: 0 2px;
}

.field { margin-bottom: 7px; }

.field label {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--muted); margin-bottom: 3px;
}

.field input[type="text"],
.field input[type="number"],
.field textarea {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: inherit; font-size: 12px;
  padding: 4px 8px; outline: none; transition: border-color .15s;
  resize: vertical;
}
.field input:focus,
.field textarea:focus { border-color: var(--accent); }

.field select {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: inherit; font-size: 12px;
  padding: 4px 8px; outline: none; cursor: pointer;
  transition: border-color .15s;
}
.field select:focus { border-color: var(--accent); }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: inherit; font-size: 12px; font-weight: 500;
  padding: 6px 13px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); cursor: pointer;
  transition: background .15s, border-color .15s, color .15s, opacity .15s;
  touch-action: manipulation;
}
.btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: .38; cursor: not-allowed; }

.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }

.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover:not(:disabled) { background: #3a1515; border-color: var(--red); }

/* ── Bulb status ── */
.bulb-status {
  margin-top: 6px;
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface2);
  font-size: 11px; color: var(--muted); min-height: 28px;
}
.bulb-status .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0; transition: background .2s;
}
.bulb-status.connected    { border-color: #2d6633; color: var(--green); }
.bulb-status.connected .dot { background: var(--green); }
.bulb-status.disconnected { border-color: #6b2020; color: var(--red); }
.bulb-status.disconnected .dot { background: var(--red); }

/* ── Tooltip ── */
.tip {
  display: inline-flex; align-items: center; justify-content: center;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); font-size: 9px; font-weight: 700;
  cursor: default; flex-shrink: 0;
}

/* ── Main ── */
.main {
  overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 16px;
}

.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 500;
}

.panel-header-actions { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── Games list ── */
#game-list { list-style: none; }

.game-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  transition: background .1s;
  flex-wrap: nowrap;
  min-width: 0;
}
.game-row:last-child { border-bottom: none; }
.game-row:hover { background: var(--surface2); }
.game-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; flex-shrink:0; width:15px; height:15px; }

.game-matchup {
  flex: 1;
  font-size: 12.5px; font-weight: 500; cursor: pointer;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.game-time { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

.game-badge {
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  border-radius: 3px; letter-spacing: .04em;
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  white-space: nowrap; flex-shrink: 0;
}
.game-badge.live  { background: #1a3a1e; border-color: #2d6633; color: var(--green); }
.game-badge.final { background: var(--surface2); color: var(--muted); }
.game-badge.fut   { background: var(--surface2); color: var(--muted); }

.team-swatches { display: flex; gap: 3px; flex-shrink: 0; }
.swatch {
  width: 10px; height: 10px; border-radius: 2px;
  border: 1px solid rgba(255,255,255,.08);
}

/* per-game delay */
.game-delay-wrap {
  display: flex; align-items: center; gap: 3px; flex-shrink: 0;
}
.game-delay-wrap label { font-size: 10px; color: var(--muted); white-space: nowrap; }
.game-delay-input {
  width: 42px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  padding: 2px 4px;
  outline: none;
  transition: border-color .15s;
  text-align: center;
}
.game-delay-input:focus { border-color: var(--accent); }

.games-empty { padding: 20px 14px; color: var(--muted); font-size: 12px; text-align: center; }

/* ── Simulate ── */
.simulate-body {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; flex-wrap: wrap;
}
.simulate-result { font-size: 11px; min-height: 16px; padding: 0 14px 8px; }
.simulate-result.ok  { color: var(--green); }
.simulate-result.err { color: var(--red); }

/* ── Log ── */
.log-wrap {
  background: #0e0e0c;
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 11.5px; height: 380px; overflow-y: auto;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
}

.log-line { line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.log-line.goal  { color: var(--accent); font-weight: 600; }
.log-line.error { color: var(--red); }
.log-line.done  { color: var(--muted); font-style: italic; }

.log-footer { display: flex; align-items: center; gap: 10px; padding: 7px 14px; }

.autoscroll-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted); cursor: pointer; user-select: none;
}
.autoscroll-label input { accent-color: var(--accent); }

.controls {
  display: flex; gap: 8px; padding: 12px 14px;
  border-top: 1px solid var(--border); flex-wrap: wrap;
}

/* ── Drawer overlay (mobile) ── */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 149;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── Mobile — drawer + layout (all screens ≤ 680px) ── */
@media (max-width: 680px) {
  :root { --header-h: 50px; }

  #menu-btn { display: flex; }

  .app {
    grid-template-columns: 1fr;
    grid-template-rows: var(--header-h) 1fr;
  }

  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: min(var(--sidebar-w), 82vw);
    height: 100dvh;
    z-index: 150;
    transform: translateX(-110%);
    border-right: 1px solid var(--border);
    padding-top: calc(var(--header-h) + 8px);
    box-shadow: 4px 0 24px rgba(0,0,0,.4);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }

  .main { padding: 12px; }

  .panel-header { flex-wrap: wrap; gap: 6px; }
  .panel-header-actions { width: 100%; justify-content: flex-end; }

  /* tighten row on all mobile */
  .game-row { padding: 8px 10px; gap: 6px; }

  /* swatches hidden on all mobile — not enough room */
  .team-swatches { display: none; }

  .controls .btn { flex: 1; justify-content: center; }
  .log-wrap { height: 260px; }
  #global-tip { max-width: 220px !important; }
}

/* ── Portrait-only phones (≤ 430px wide) ──
   Hide the start time on the narrowest screens so
   checkbox + matchup + badge + delay all fit on one row. */
@media (max-width: 430px) {
  .game-time { display: none; }
}
</style>
</head>
<body>

<div class="app">

  <header>
    <button class="icon-btn" id="menu-btn" title="Settings" aria-label="Toggle settings">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <line x1="2" y1="4"  x2="14" y2="4"/>
        <line x1="2" y1="8"  x2="14" y2="8"/>
        <line x1="2" y1="12" x2="14" y2="12"/>
      </svg>
    </button>
    <span class="logo">NHL <span>Goal Light</span></span>
    <div class="header-right">
      <span class="status-pill" id="status-pill">Idle</span>
      <button class="icon-btn" id="theme-btn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">

    <div class="sidebar-section">
      <div class="section-label">Bulbs</div>
      <div class="field">
        <label>IP Addresses <span class="tip" data-tip="One IP per line. All bulbs flash simultaneously on a goal. Find IPs in the Kasa app under device settings.">?</span></label>
        <textarea id="bulb-ips" rows="3" placeholder="192.168.x.x&#10;192.168.x.y"></textarea>
      </div>
      <button class="btn" id="test-btn" style="width:100%;justify-content:center">Test Connection</button>
      <div class="bulb-status" id="bulb-status">
        <div class="dot"></div>
        <span id="bulb-status-text">Not tested</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Flash</div>
      <div class="field"><label>Duration (s) <span class="tip" data-tip="How long the bulb flashes after a goal. e.g. 12 = 12 seconds.">?</span></label><input type="number" id="flash_duration" value="12" min="1" step="1" /></div>
      <div class="field"><label>Interval (s) <span class="tip" data-tip="How fast the bulb alternates colors. Lower = faster strobe. e.g. 0.45.">?</span></label><input type="number" id="flash_interval" value="0.45" min="0.05" step="0.05" /></div>
      <div class="field"><label>Quiet window (s) <span class="tip" data-tip="After flashing, waits this long for burst goals before restoring.">?</span></label><input type="number" id="flash_quiet_window" value="1.5" min="0" step="0.1" /></div>
      <div class="field"><label>Transition (ms) <span class="tip" data-tip="Fade time between colors. 0 = instant snap.">?</span></label><input type="number" id="flash_transition_ms" value="120" min="0" step="10" /></div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Polling</div>
      <div class="field"><label>Live (s) <span class="tip" data-tip="How often the NHL API is polled during a live game.">?</span></label><input type="number" id="poll_live_seconds" value="1.0" min="0.1" step="0.1" /></div>
      <div class="field"><label>Critical (s) <span class="tip" data-tip="Poll interval in the final minute of a period.">?</span></label><input type="number" id="poll_critical_seconds" value="0.75" min="0.1" step="0.05" /></div>
      <div class="field"><label>Pregame (s) <span class="tip" data-tip="Poll interval before puck drop.">?</span></label><input type="number" id="poll_pregame_seconds" value="10" min="1" step="1" /></div>
      <div class="field"><label>Error (s) <span class="tip" data-tip="Wait before retrying after a failed request.">?</span></label><input type="number" id="poll_error_seconds" value="5" min="1" step="1" /></div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Network</div>
      <div class="field"><label>Request timeout (s) <span class="tip" data-tip="Max wait for NHL API response before treating as failed.">?</span></label><input type="number" id="request_timeout" value="10" min="1" step="1" /></div>
      <div class="field"><label>Max retries <span class="tip" data-tip="Times to retry a failed NHL API request.">?</span></label><input type="number" id="max_retries" value="4" min="0" step="1" /></div>
      <div class="field"><label>Backoff base (s) <span class="tip" data-tip="Starting backoff wait. Doubles each retry up to Backoff max.">?</span></label><input type="number" id="backoff_base" value="1.0" min="0.1" step="0.1" /></div>
      <div class="field"><label>Backoff max (s) <span class="tip" data-tip="Max backoff cap between retries.">?</span></label><input type="number" id="backoff_max" value="30.0" min="1" step="1" /></div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Timing</div>
      <div class="field"><label>Pregame buffer (s) <span class="tip" data-tip="Seconds before puck drop to start polling. Default 300 = 5 min early.">?</span></label><input type="number" id="pregame_buffer_seconds" value="300" min="0" step="30" /></div>
      <div class="field"><label>Restore transition (ms) <span class="tip" data-tip="Fade time back to original color after flash. 0 = instant.">?</span></label><input type="number" id="restore_transition_ms" value="150" min="0" step="10" /></div>
      <div class="field">
        <label>Default TV Delay (s) <span class="tip" data-tip="Global fallback delay. Each game row can override this individually.">?</span></label>
        <input type="number" id="goal_delay_seconds" value="35" min="0" step="1" />
      </div>
    </div>

  </aside>

  <main class="main">

    <div class="panel">
      <div class="panel-header">
        <span>Today's Games</span>
        <div class="panel-header-actions">
          <button class="btn" id="select-all-btn">Select All</button>
          <button class="btn" id="deselect-all-btn">Deselect All</button>
          <button class="btn" id="refresh-games-btn">↻ Refresh</button>
        </div>
      </div>
      <ul id="game-list">
        <li class="games-empty" id="games-loading">Loading games…</li>
      </ul>
    </div>

    <div class="panel" style="flex:1;display:flex;flex-direction:column;">
      <div class="panel-header">
        <span>Live Log</span>
        <div class="panel-header-actions">
          <button class="btn" id="clear-log-btn">Clear</button>
        </div>
      </div>
      <div class="log-wrap" id="log-wrap"></div>
      <div class="log-footer">
        <label class="autoscroll-label">
          <input type="checkbox" id="autoscroll" checked /> Auto-scroll
        </label>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="start-btn">▶ Start Monitoring</button>
        <button class="btn btn-danger"  id="stop-btn" disabled>■ Stop</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><span>Simulate Goal</span></div>
      <div class="simulate-body">
        <div class="field" style="margin:0;flex:1;min-width:120px">
          <select id="sim-team"><option value="">— Pick a team —</option></select>
        </div>
        <button class="btn btn-primary" id="sim-btn">⚡ Fire</button>
      </div>
      <div class="simulate-result" id="sim-result"></div>
    </div>

  </main>

</div>

<div id="global-tip" style="position:fixed;z-index:9999;background:#111;color:#e8e6e0;border:1px solid #2e2d2a;border-radius:4px;padding:5px 8px;font-size:11px;line-height:1.45;max-width:200px;white-space:pre-wrap;pointer-events:none;opacity:0;transition:opacity .12s;top:0;left:0"></div>

<script>
"use strict";

let _es = null;
let _statusTimer = null;
let _teamColors = {};

const TEAM_NAMES = {
  "ANA":"Anaheim Ducks","BOS":"Boston Bruins","BUF":"Buffalo Sabres",
  "CGY":"Calgary Flames","CAR":"Carolina Hurricanes","CHI":"Chicago Blackhawks",
  "COL":"Colorado Avalanche","CBJ":"Columbus Blue Jackets","DAL":"Dallas Stars",
  "DET":"Detroit Red Wings","EDM":"Edmonton Oilers","FLA":"Florida Panthers",
  "LAK":"Los Angeles Kings","MIN":"Minnesota Wild","MTL":"Montreal Canadiens",
  "NSH":"Nashville Predators","NJD":"New Jersey Devils","NYI":"New York Islanders",
  "NYR":"New York Rangers","OTT":"Ottawa Senators","PHI":"Philadelphia Flyers",
  "PIT":"Pittsburgh Penguins","SJS":"San Jose Sharks","SEA":"Seattle Kraken",
  "STL":"St. Louis Blues","TBL":"Tampa Bay Lightning","TOR":"Toronto Maple Leafs",
  "UTA":"Utah Hockey Club","VAN":"Vancouver Canucks","VGK":"Vegas Golden Knights",
  "WSH":"Washington Capitals","WPG":"Winnipeg Jets",
};

const $ = id => document.getElementById(id);
const statusPill   = $("status-pill");
const startBtn     = $("start-btn");
const stopBtn      = $("stop-btn");
const testBtn      = $("test-btn");
const bulbStatus   = $("bulb-status");
const bulbStatusTx = $("bulb-status-text");
const themeBtn     = $("theme-btn");
const menuBtn      = $("menu-btn");
const sidebar      = $("sidebar");
const overlay      = $("sidebar-overlay");
const logWrap      = $("log-wrap");
const autoscroll   = $("autoscroll");
const gameList     = $("game-list");
const clearLogBtn  = $("clear-log-btn");
const refreshBtn   = $("refresh-games-btn");
const selectAll    = $("select-all-btn");
const deselectAll  = $("deselect-all-btn");
const simBtn       = $("sim-btn");
const simResult    = $("sim-result");
const simTeam      = $("sim-team");
const tooltip      = $("global-tip");

// ── Mobile drawer ──
function openDrawer()  { sidebar.classList.add("open"); overlay.classList.add("open"); }
function closeDrawer() { sidebar.classList.remove("open"); overlay.classList.remove("open"); }
menuBtn.addEventListener("click", () => sidebar.classList.contains("open") ? closeDrawer() : openDrawer());
overlay.addEventListener("click", closeDrawer);

// ── Tooltip ──
function attachTooltip(el) {
  el.addEventListener("mouseenter", () => {
    tooltip.textContent = el.dataset.tip || "";
    const r = el.getBoundingClientRect();
    const spaceRight = window.innerWidth - r.right;
    if (spaceRight > 212) {
      tooltip.style.top  = (r.top + r.height / 2 - 10) + "px";
      tooltip.style.left = (r.right + 8) + "px";
    } else {
      tooltip.style.top  = (r.bottom + 6) + "px";
      tooltip.style.left = Math.max(8, r.left - 40) + "px";
    }
    tooltip.style.opacity = "1";
  });
  el.addEventListener("mouseleave", () => { tooltip.style.opacity = "0"; });
}
document.querySelectorAll(".tip").forEach(attachTooltip);

// ── Theme ──
themeBtn.addEventListener("click", () => {
  const html = document.documentElement;
  const dark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", dark ? "light" : "dark");
  themeBtn.textContent = dark ? "☀️" : "🌙";
});

// ── Log ──
function appendLog(text, cls = "") {
  const div = document.createElement("div");
  div.className = "log-line" + (cls ? " " + cls : "");
  div.textContent = text;
  logWrap.appendChild(div);
  if (autoscroll.checked) logWrap.scrollTop = logWrap.scrollHeight;
}
function classifyLine(line) {
  const u = line.toUpperCase();
  if (u.includes("GOAL")) return "goal";
  if (u.includes("ERROR") || u.includes("EXCEPTION") || u.includes("TRACEBACK")) return "error";
  if (line.trim() === "[DONE]") return "done";
  return "";
}
clearLogBtn.addEventListener("click", () => { logWrap.innerHTML = ""; });

// ── Bulb helpers ──
function getBulbIps() {
  return $("bulb-ips").value.split("\n").map(s => s.trim()).filter(Boolean);
}
function setBulbStatus(state, text) {
  bulbStatus.className = "bulb-status " + state;
  bulbStatusTx.textContent = text;
}

// ── Colors / swatches ──
function hsvToHex(h, s, v) {
  s /= 100; v /= 100;
  const f = n => { const k = (n + h/60) % 6; return v - v*s*Math.max(0, Math.min(k, 4-k, 1)); };
  const x = n => Math.round(f(n)*255).toString(16).padStart(2,"0");
  return `#${x(5)}${x(3)}${x(1)}`;
}
function makeSwatch(hsv) {
  const [h,s,v] = hsv;
  const el = document.createElement("div");
  el.className = "swatch";
  el.style.background = (v===0 && s===0) ? "#111" : hsvToHex(h,s,v);
  return el;
}
async function loadTeamColors() {
  try {
    const r = await fetch("/api/team-colors");
    if (!r.ok) return;
    _teamColors = await r.json();
    Object.keys(_teamColors).sort().forEach(abbrev => {
      const opt = document.createElement("option");
      opt.value = abbrev;
      opt.textContent = TEAM_NAMES[abbrev] ? `${TEAM_NAMES[abbrev]} (${abbrev})` : abbrev;
      simTeam.appendChild(opt);
    });
  } catch (_) {}
}

// ── Games ──
function badgeClass(state) {
  if (state === "LIVE" || state === "CRIT") return "live";
  if (state === "FINAL" || state === "OFF")  return "final";
  return "fut";
}
function getGameDelays() {
  const map = {};
  gameList.querySelectorAll(".game-delay-input").forEach(inp => {
    map[inp.dataset.gameId] = parseFloat(inp.value) || 0;
  });
  return map;
}

function renderGames(games) {
  gameList.innerHTML = "";
  if (!games || games.length === 0) {
    gameList.innerHTML = '<li class="games-empty">No games scheduled today.</li>';
    return;
  }
  const defaultDelay = parseFloat($("goal_delay_seconds").value) || 35;

  games.forEach(g => {
    const li = document.createElement("li");
    li.className = "game-row";
    li.dataset.gameId = g.id;

    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.value = g.id; cb.id = `game-${g.id}`;

    const matchup = document.createElement("label");
    matchup.htmlFor = `game-${g.id}`;
    matchup.className = "game-matchup";
    matchup.textContent = `${g.away_abbrev} @ ${g.home_abbrev}`;

    const time = document.createElement("span");
    time.className = "game-time";
    time.textContent = g.start_time_local;

    const badge = document.createElement("span");
    badge.className = `game-badge ${badgeClass(g.game_state)}`;
    badge.textContent = g.game_state || "?";

    const swatches = document.createElement("div");
    swatches.className = "team-swatches";
    const ac = _teamColors[g.away_abbrev];
    const hc = _teamColors[g.home_abbrev];
    if (ac) { swatches.appendChild(makeSwatch(ac.primary)); swatches.appendChild(makeSwatch(ac.secondary)); }
    if (hc) {
      const sep = document.createElement("div"); sep.style.cssText="width:4px";
      swatches.appendChild(sep);
      swatches.appendChild(makeSwatch(hc.primary)); swatches.appendChild(makeSwatch(hc.secondary));
    }

    const delayWrap = document.createElement("div");
    delayWrap.className = "game-delay-wrap";
    const delayLabel = document.createElement("label");
    delayLabel.textContent = "Delay:";
    delayLabel.htmlFor = `delay-${g.id}`;
    const delayInp = document.createElement("input");
    delayInp.type = "number";
    delayInp.id = `delay-${g.id}`;
    delayInp.className = "game-delay-input";
    delayInp.dataset.gameId = g.id;
    delayInp.value = defaultDelay;
    delayInp.min = "0"; delayInp.step = "1";
    delayInp.title = "TV delay for this game (seconds)";
    const delayUnit = document.createElement("span");
    delayUnit.textContent = "s";
    delayUnit.style.cssText = "font-size:10px;color:var(--muted)";
    delayWrap.append(delayLabel, delayInp, delayUnit);

    li.append(cb, matchup, time, badge, swatches, delayWrap);
    li.addEventListener("click", e => {
      if (e.target === cb || e.target === delayInp || e.target === delayLabel || e.target === matchup) return;
      cb.checked = !cb.checked;
    });
    gameList.appendChild(li);
  });
}

async function fetchGames() {
  gameList.innerHTML = '<li class="games-empty">Loading games…</li>';
  try {
    const r = await fetch("/api/games");
    const data = await r.json();
    if (Array.isArray(data)) renderGames(data);
    else gameList.innerHTML = `<li class="games-empty">Error: ${data.error||"Unknown"}</li>`;
  } catch (e) {
    gameList.innerHTML = `<li class="games-empty">Network error: ${e.message}</li>`;
  }
}

$("goal_delay_seconds").addEventListener("change", () => {
  const newDefault = parseFloat($("goal_delay_seconds").value) || 0;
  gameList.querySelectorAll(".game-delay-input").forEach(inp => { inp.value = newDefault; });
});

selectAll.addEventListener("click",   () => gameList.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true));
deselectAll.addEventListener("click", () => gameList.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false));
refreshBtn.addEventListener("click", fetchGames);

// ── Bulb test ──
testBtn.addEventListener("click", async () => {
  const ips = getBulbIps();
  if (!ips.length) { setBulbStatus("disconnected", "Enter at least one IP"); return; }
  testBtn.disabled = true;
  setBulbStatus("testing", `Testing ${ips.length} bulb${ips.length>1?"s":""}\u2026`);
  try {
    const results = await Promise.all(ips.map(async ip => {
      try {
        const r = await fetch(`/api/test-bulb?ip=${encodeURIComponent(ip)}`);
        const d = await r.json();
        return { ip, ok: d.ok, model: d.model, error: d.error };
      } catch (e) { return { ip, ok: false, error: e.message }; }
    }));
    const failed = results.filter(r => !r.ok);
    if (failed.length === 0)
      setBulbStatus("connected", ips.length === 1 ? `Connected — ${results[0].model || ips[0]}` : `${ips.length} bulbs connected`);
    else if (failed.length === results.length)
      setBulbStatus("disconnected", failed.length === 1 ? (failed[0].error||"Failed") : `All ${failed.length} bulbs failed`);
    else
      setBulbStatus("disconnected", `${failed.length}/${results.length} bulbs failed`);
  } catch (e) {
    setBulbStatus("disconnected", e.message);
  } finally {
    testBtn.disabled = false;
  }
});

$("bulb-ips").addEventListener("input", () => {
  localStorage.setItem("nhl_bulb_ips", $("bulb-ips").value);
  setBulbStatus("", "Not tested");
});

// ── Simulate Goal ──
simBtn.addEventListener("click", async () => {
  const ips  = getBulbIps();
  const team = simTeam.value;
  if (!ips.length) { simResult.className="simulate-result err"; simResult.textContent="✗ Enter a bulb IP first"; return; }
  if (!team)       { simResult.className="simulate-result err"; simResult.textContent="✗ Pick a team first"; return; }
  const teamLabel = TEAM_NAMES[team] || team;
  simBtn.disabled = true;
  simResult.className = "simulate-result";
  simResult.textContent = `Firing ${teamLabel} flash on ${ips.length} bulb${ips.length>1?"s":""}\u2026`;
  try {
    const params = new URLSearchParams({
      ip: ips.join(","), team,
      flash_duration:      $("flash_duration").value,
      flash_interval:      $("flash_interval").value,
      flash_transition_ms: $("flash_transition_ms").value,
    });
    const r = await fetch(`/api/simulate-goal?${params}`);
    const d = await r.json();
    if (d.ok) { simResult.className="simulate-result ok";  simResult.textContent=`✓ ${teamLabel} flash complete`; }
    else      { simResult.className="simulate-result err"; simResult.textContent=`✗ ${d.error||"Failed"}`; }
  } catch (e) {
    simResult.className="simulate-result err"; simResult.textContent=`✗ ${e.message}`;
  } finally { simBtn.disabled = false; }
});

// ── SSE ──
function openSSE() {
  if (_es) { _es.close(); _es = null; }
  _es = new EventSource("/api/log");
  _es.onmessage = e => {
    const line = e.data;
    if (line === "[DONE]") {
      appendLog("— monitoring ended —", "done");
      _es.close(); _es = null;
      setMonitoringState(false);
      return;
    }
    appendLog(line, classifyLine(line));
  };
  _es.onerror = () => { if (_es) { _es.close(); _es = null; } };
}

// ── Status polling ──
function setMonitoringState(active) {
  statusPill.textContent = active ? "Monitoring" : "Idle";
  statusPill.className   = "status-pill" + (active ? " monitoring" : "");
  startBtn.disabled = active;
  stopBtn.disabled  = !active;
}
async function pollStatus() {
  try {
    const r = await fetch("/api/status");
    const d = await r.json();
    setMonitoringState(d.state === "monitoring");
  } catch (_) {}
}

// ── Start / Stop ──
startBtn.addEventListener("click", async () => {
  const ips = getBulbIps();
  if (!ips.length) { alert("Enter at least one bulb IP."); return; }
  const checked = Array.from(gameList.querySelectorAll('input[type="checkbox"]:checked'));
  if (!checked.length) { alert("Select at least one game."); return; }
  const gameDelays = getGameDelays();
  const game_ids   = checked.map(cb => Number(cb.value));
  const per_game_delays = game_ids.map(id => gameDelays[id] ?? parseFloat($("goal_delay_seconds").value) ?? 35);
  const body = {
    bulb_ips: ips, game_ids, per_game_delays,
    flash_duration:        parseFloat($("flash_duration").value),
    flash_interval:        parseFloat($("flash_interval").value),
    flash_quiet_window:    parseFloat($("flash_quiet_window").value),
    flash_transition_ms:   parseInt($("flash_transition_ms").value),
    poll_live_seconds:     parseFloat($("poll_live_seconds").value),
    poll_critical_seconds: parseFloat($("poll_critical_seconds").value),
    poll_pregame_seconds:  parseFloat($("poll_pregame_seconds").value),
    poll_error_seconds:    parseFloat($("poll_error_seconds").value),
    request_timeout:       parseFloat($("request_timeout").value),
    max_retries:           parseInt($("max_retries").value),
    backoff_base:          parseFloat($("backoff_base").value),
    backoff_max:           parseFloat($("backoff_max").value),
    pregame_buffer_seconds:parseInt($("pregame_buffer_seconds").value),
    restore_transition_ms: parseInt($("restore_transition_ms").value),
    goal_delay_seconds:    parseFloat($("goal_delay_seconds").value),
  };
  try {
    const r = await fetch("/api/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) { alert(d.error || "Failed to start"); return; }
    openSSE();
    setMonitoringState(true);
  } catch (e) { alert("Error: " + e.message); }
});

stopBtn.addEventListener("click", async () => {
  try {
    await fetch("/api/stop", { method: "POST" });
    setMonitoringState(false);
    if (_es) { _es.close(); _es = null; }
    appendLog("— stopped by user —", "done");
  } catch (e) { alert("Error: " + e.message); }
});

// ── Init ──
(async () => {
  const savedIps = localStorage.getItem("nhl_bulb_ips");
  if (savedIps) $("bulb-ips").value = savedIps;
  await fetchGames();
  await loadTeamColors();
  await pollStatus();
  _statusTimer = setInterval(pollStatus, 3000);
})();
</script>
